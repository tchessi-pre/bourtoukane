<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <pattern id="wax" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="7" height="14" fill="#D4AF37" />
      <rect x="7" width="7" height="14" fill="#228B22" />
    </pattern>
    <pattern id="wax2" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="9" height="18" fill="#1E90FF" />
      <rect x="9" width="9" height="18" fill="#FF6B35" />
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="14" fill="#0B0B0F" />
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#wax)" opacity="0.95" />
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#wax2)" opacity="0.55" />
  <rect x="6" y="6" width="52" height="52" rx="12" fill="#0B0B0F" opacity="0.18" />
  <rect x="6" y="6" width="52" height="52" rx="12" fill="none" stroke="#FFFFFF" opacity="0.10" />
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-size="34"
    font-weight="800"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace"
    fill="#FFFFFF"
    filter="url(#softShadow)"
  >
    B
  </text>
